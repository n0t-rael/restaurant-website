<!DOCTYPE html>
<html>
<head>
    <title>Home - My Restaurant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
        }

        header {
            background: url('images/bg.jpg');
            background-size: cover;
            color: white;
            padding: 60px;
        }

        nav {
            background: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 20px;
        }

        .food-img {
            width: 250px;
            border-radius: 10px;
            margin: 10px;
        }

        .btn {
            background: red;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        footer {
            background: black;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Welcome to My Restaurant</h1>
        <p>Delicious Food | Best Quality | Fast Service</p>
        <a href="#" class="btn">Order Now</a>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Home Section -->
    <section>
        <h2>Our Special Dishes</h2>
        <p>Enjoy our tasty and fresh food items</p>

        <img src="images/pizza.jpg" class="food-img" alt="Pizza">
        <img src="images/burger.jpg" class="food-img" alt="Burger">
        <img src="images/pasta.jpg" class="food-img" alt="Pasta">
    </section>

    <!-- About -->
    <section>
        <h2>About Us</h2>
        <p>We provide the best quality food with fresh ingredients.</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Restaurant</p>
    </footer>

</body>
</html>
